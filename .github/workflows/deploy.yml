name: Deploy Frontend

on:
  push:
    branches:
      - main  # 배포할 브랜치 명으로 수정 가능

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Deploy to Lightsail
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail

            echo "🚀 프론트엔드 배포 시작!"

            export NVM_DIR="$HOME/.nvm"
            if [ -s "$NVM_DIR/nvm.sh" ]; then
              # non-interactive SSH에서는 .bashrc의 nvm이 로드되지 않을 수 있음
              . "$NVM_DIR/nvm.sh"
              nvm use 22
            else
              echo "❌ nvm not found at $NVM_DIR — install Node 22+ on the server"
              exit 1
            fi

            node -v
            npm -v

            cd ~/projects/muhanmantle-front
            git pull origin main
            npm install
            npm run build

            # Nginx용 정적 파일 덮어쓰기 (Vite → dist/)
            sudo rm -rf /var/www/muhanmantle-front/*
            sudo cp -r dist/* /var/www/muhanmantle-front/

            # Nginx 리로드
            sudo systemctl reload nginx

            echo "✅ 프론트 배포 완료!"
